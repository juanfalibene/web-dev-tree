name: Weekly AI Curation Bot

on:
  schedule:
    # Corre todos los martes a las 04:00 AM UTC
    - cron: '0 4 * * 2'
  workflow_dispatch:
    # Permite correrlo manualmente desde Actions tab para hacer pruebas.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  curate_and_post:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # cache pip dependencies

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Execute Curation Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WP_API_URL: ${{ secrets.WP_API_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASS: ${{ secrets.WP_APP_PASS }}
        run: python scripts/curator_bot.py
